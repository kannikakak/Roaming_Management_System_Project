<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 170" role="img" aria-labelledby="title desc">
  <title id="title">Cellcard Logo</title>
  <desc id="desc">Cellcard wordmark with Roaming Analytics subtitle</desc>
  <defs>
    <linearGradient id="brandFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="170" fill="none" />

  <text
    x="18"
    y="78"
    font-family="Poppins, Segoe UI, Arial, sans-serif"
    font-size="62"
    font-weight="700"
    fill="url(#brandFill)"
  >
    Cellcard
  </text>

  <text
    x="18"
    y="128"
    font-family="Poppins, Segoe UI, Arial, sans-serif"
    font-size="34"
    font-weight="500"
    letter-spacing="4"
    fill="url(#brandFill)"
  >
    ROAMING ANALYTICS
  </text>
</svg>
